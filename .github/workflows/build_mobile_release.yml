name: Build and Deploy to Android APK

on:
  push:
    branches:
      - main

env:
  FLUTTER_VERSION: 3.41.6
  JAVA_DISTRIBUITION: corretto
  JAVA_VERSION: 17

jobs:
  build_android:
    name: Build Flutter App for Android
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUITION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup Android Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
        run: |
          cd apps/mobile/android/app
          echo "$KEYSTORE_BASE64" | base64 --decode > key.jks
          cd ../
          echo "$KEY_PROPERTIES" > key.properties

      - name: Build Android APK
        run: |
          cd apps/mobile
          flutter pub get
          flutter build apk --release

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(grep '^version:' apps/mobile/pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Tag
        id: create_tag
        run: |
          TAG_NAME="release-${{ steps.get_version.outputs.version }}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag $TAG_NAME
          git push origin $TAG_NAME

      - name: Create Release
        id: create_release
        run: |
          gh release create ${{ steps.get_version.outputs.version }} \
            --title "Release ${{ steps.get_version.outputs.version }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        run: |
          gh release upload ${{ steps.get_version.outputs.version }} \
          apps/mobile/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
