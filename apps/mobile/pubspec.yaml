name: the_makita_verse_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  cached_network_image: ^3.4.1
  equatable: ^2.0.8
  flutter_html: ^3.0.0
  fpdart: ^1.2.0
  get_it: ^9.2.1
  http: ^1.6.0
  just_audio: ^0.10.5
  logger: ^2.7.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

